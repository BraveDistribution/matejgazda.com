project:
  type: website
  output-dir: _site
  resources:
    - "wp-assets/**"
    - "CNAME"
    - ".nojekyll"
    - "papers_map.html"
    - "lab_network.html"

website:
  draft-mode: unlinked
  title: "Matej Gazda"
  description: "AI researcher. Notes on machine learning, medical imaging, and assorted curiosities."
  site-url: https://matejgazda.com
  repo-url: https://github.com/BraveDistribution/matejgazda.com
  open-graph: true
  twitter-card: true
  favicon: assets/favicon.ico
  back-to-top-navigation: true
  search:
    location: navbar
    type: overlay
  navbar:
    pinned: true
    background: light
    logo: assets/avatar.jpg
    logo-alt: "Matej Gazda"
    title: "Matej Gazda"
    collapse-below: lg
    left:
      - text: "Writing"
        href: posts/index.qmd
      - text: "Publications"
        href: publications.qmd
      - text: "Projects"
        href: projects.qmd
      - text: "About"
        href: about.qmd
    right:
      - icon: github
        href: https://github.com/BraveDistribution
        aria-label: GitHub
  page-footer:
    border: false
    background: light
    left: |
      © 2026 Matej Gazda
    center: |
      Built with [Quarto](https://quarto.org). Source on
      [GitHub](https://github.com/BraveDistribution/matejgazda.com).
    right:
      - icon: github
        href: https://github.com/BraveDistribution

format:
  html:
    theme:
      light: [cosmo, assets/theme.scss]
      dark: [darkly, assets/theme-dark.scss]
    css: assets/styles.css
    toc: true
    toc-depth: 3
    toc-location: right
    code-copy: true
    code-overflow: wrap
    code-block-bg: true
    code-block-border-left: false
    highlight-style:
      light: github
      dark: github-dark
    fig-cap-location: bottom
    tbl-cap-location: top
    citations-hover: true
    crossrefs-hover: true
    fontsize: 1.05em
    linestretch: 1.65
    mainfont: "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
    monofont: "'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
    anchor-sections: true
    smooth-scroll: true
    include-in-header:
      text: |
        <script data-goatcounter="https://matejgazda.goatcounter.com/count"
                async src="//gc.zgo.at/count.js"></script>
